services:
  server:
    build: .
    container_name: tcp-server
    command: ["server", "-p", "6433"]   #serveur
    ports:
      - "6433:6433"
      - "6434:6434"   # broadcast port
    restart: unless-stopped

  client:
    build: .
    container_name: tcp-client
    depends_on:
      - server
    command: ["client", "-H", "server", "-p", "6433"] #client
    stdin_open: true
    tty: true
